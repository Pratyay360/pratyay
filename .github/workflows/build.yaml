name: cloudflare pages

on:
  push:
    branches:
      - main 
  workflow_dispatch:
  event:
    webhook:
      -
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0  # Change if you need git info

      - name: Setup Zine
        uses: kristoff-it/setup-zine@v1
        with:
          version: latest
      - name: populate blog 
        run: |
          curl https://api.github.com/repos/${{ github.user }}/blogs_md/contents/content | jq -r '.[] | .download_url' | xargs -I {} -L1 curl -L -o content/{}.md {}
      - name: Build
        run: zine release
          
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public/ --project-name pratyay
          githubToken: ${{ github.token }}
