name: Deploy the website to Codeberg Pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Zine
        uses: https://github.com/kristoff-it/setup-zine@v2

      - name: Build
        run: zine release

      - name: Setup Nodejs
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Index site with Pagefind
        run: npx pagefind --site public

      - uses: https://codeberg.org/git-pages/action@v2
        with:
          site: "https://${{ forge.repository_owner }}.codeberg.page/${{ forge.repository_name }}"
          token: ${{ forge.token }}
          source: public
