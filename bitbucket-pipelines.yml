image: atlassian/default-image:4

pipelines:
  branches:
    main:
      - step:
          name: Build and Deploy to Cloudflare Pages
          caches:
            - node
          script:
             curl -L https://github.com/kristoff-it/zine/releases/download/v0.10.0-preview/zine-linux-x86_64.tar.gz -o zine.tar.gz
            tar -xzf zine.tar.gz
            chmod +x zine
            ./zine release
           - name: install wrangler
             script: 
                npm install -g wrangler &&
                wrangler pages deploy public \
                --project-name pratyay \
                --branch main
