<extend template="base.shtml">
<head id="head">

	<meta charset="utf-8" >
	<meta name="viewport" content="initial-scale=1" >
	<meta name="generator" content="Zine" >
	<meta property="og:description" :content="$site.description" >
	<meta property="og:title" content="$page.title" >
	<meta property="og:url" content="$site.url()" >
	<meta property="og:type" content="personal website" >
	<meta property="og:site_name" content="Pratyay" >
	<meta property="og:locale" content="en_US" >
	<ctx :if="$site.page('').isCurrent()">
		<title :text="$site.title"></title>
	</ctx>
	<ctx :if="$site.page('').isCurrent().not()">
		<title :text="$site.title.prefix($page.title, ' - ')"></title>
	</ctx>
	<link type="text/css" rel="stylesheet" href="$site.asset.css('style.css').link()">
	<link type="text/css" rel="stylesheet" href="$site.asset.css('highlight.css').link()">
	<link type="text/css" rel="stylesheet" href="$site.asset.css('Temml-Local.css').link()">
	<script defer src="$site.asset.js('render-mathtex.js').link()"></script>
	<script data-goatcounter="https://pratyay.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<header id="header"><super></header>
<main id="main"><super></main>
<footer id="footer"><super></footer>
